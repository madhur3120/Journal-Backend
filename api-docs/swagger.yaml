swagger: "2.0"
info:
  title: Journal Backend Application
  description: Tailored journal modules for teachers and students
  version: 1.0
servers:
  - url: https://journal-backend-t8gt.onrender.com/api/v1
    description: Render Hosted Server
  - url: http://localhost:5000/api/v1
    description: localhost environment
schemes:
  - https
  - http
securityDefinitions:
  JWT:
    type: apiKey
    description: JWT token for authentication. Provide the token with the 'Bearer' prefix. Example "Bearer jwt_token"
    name: Authorization
    in: header
basePath: /api/v1
definitions:
  User:
    type: object
    properties:
      _id:
        type: string
      firstname:
        type: string
      lastname:
        type: string
      email:
        type: string
      role:
        type: string
        enum: ["STUDENT", "TEACHER"]
  Journal:
    type: object
    properties:
      journal_id:
        type: string
      name:
        type: string
      teacher_id:
        type: integer
      description:
        type: string
      category_id:
        type: integer
      is_draft:
        type: boolean
      created_at:
        type: string
        format: date-time
      updated_at:
        type: string
        format: date-time
      file:
        type: string
      published_at:
        type: string
        format: date-time
  Category:
    type: object
    properties:
      id:
        type: integer
      name:
        type: string
      description:
        type: string
      created_at:
        type: string
        format: date-time
  Comment:
    type: object
    properties:
      id:
        type: integer
      journal_id:
        type: integer
      user_id:
        type: integer
      parent_id:
        type: integer
      content:
        type: string
      first_name:
        type: string
      last_name:
        type: string
      role:
        type: string
      created_at:
        type: string
        format: date-time
      updated_at:
        type: string
        format: date-time
      replies:
        type: array
        items:
          $ref: "#/definitions/Comment"
  ReadReceipt:
    type: object
    properties:
      id:
        type: integer
      journal_id:
        type: integer
      student_id:
        type: integer
      read_at:
        type: string
        format: date-time
  ReadStats:
    type: object
    properties:
      totalReaders:
        type: integer
      totalTagged:
        type: integer
      readPercentage:
        type: integer
      readers:
        type: array
        items:
          type: object
          properties:
            student_id:
              type: integer
            first_name:
              type: string
            last_name:
              type: string
            email:
              type: string
            read_at:
              type: string
              format: date-time
paths:
  /user/register:
    post:
      tags:
        - User
      summary: Register User
      consumes:
        - application/json
      parameters:
        - in: body
          name: user
          description: User registration details
          required: true
          schema:
            type: object
            properties:
              firstname:
                type: string
              lastname:
                type: string
              email:
                type: string
              password:
                type: string
              role:
                type: string
                enum: ["STUDENT", "TEACHER"]
            required:
              - firstname
              - lastname
              - email
              - password
              - role
      responses:
        "201":
          description: User Registered Successfully
        "400":
          description: Validation Error
        "422":
          description: Email already exists
        "500":
          description: Internal Server Error
  /user/login:
    post:
      tags:
        - User
      summary: Login User
      consumes:
        - application/json
      parameters:
        - in: body
          name: user
          schema:
            type: object
            properties:
              email:
                type: string
              password:
                type: string
      responses:
        "200":
          description: User Logged In
        "400":
          description: Validation Error
        "500":
          description: Internal Server Error
  /user/feed:
    get:
      tags: [Feed]
      summary: returns user feed of logged in user (teacher or student)
      security:
        - JWT: []
      responses:
        "200":
          description: returns user feed based on id
        "400":
          description: Bad Request
        "500":
          description: Internal Server Error
  /journal:
    post:
      tags:
        - Journal
      summary: Create a Journal (with optional draft mode)
      consumes:
        - multipart/form-data
      security:
        - JWT: []
      parameters:
        - in: formData
          name: description
          type: string
          description: Description of the journal
        - in: formData
          name: publishedAt
          type: string
          format: date-time
          description: Publication date and time (YYYY-MM-DD HH:MM:SS)
        - in: formData
          name: file
          type: file
          description: Journal attachment
        - in: formData
          name: tagged
          type: string
          description: Comma separated student Ids (e.g., 1,2,3)
        - in: formData
          name: categoryId
          type: integer
          description: Category ID for the journal
        - in: formData
          name: isDraft
          type: boolean
          description: Set to true to save as draft without publishing
      responses:
        "201":
          description: Journal created successfully
        "400":
          description: Bad Request
        "500":
          description: Internal Server Error

  /journal/{id}:
    get:
      tags: [Journal]
      summary: Get a journal by ID
      security:
        - JWT: []
      parameters:
        - in: path
          name: id
          required: true
          description: ID of the journal entry
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Journal entry retrieved successfully
          schema:
            $ref: "#/definitions/Journal"
        "404":
          description: Journal entry not found
        "500":
          description: Internal Server Error

    put:
      tags: [Journal]
      summary: Update an existing journal (Teacher)
      security:
        - JWT: []
      consumes:
        - application/json
      parameters:
        - in: path
          name: id
          required: true
          description: ID of the journal entry to be updated
          schema:
            type: integer
            format: int64
        - in: body
          name: body
          description: Update fields for the journal entry
          required: true
          schema:
            type: object
            properties:
              description:
                type: string
                description: Description of the journal entry
      responses:
        "200":
          description: Journal entry updated successfully
        "400":
          description: Bad Request
        "404":
          description: Journal entry not found
        "500":
          description: Internal Server Error

    delete:
      tags:
        - Journal
      summary: Delete a journal entry (Teacher)
      security:
        - JWT: []
      parameters:
        - in: path
          name: id
          schema:
            type: integer
            format: int64
      responses:
        "204":
          description: Journal entry deleted successfully
        "400":
          description: Validation Error
        "404":
          description: Journal entry not found
        "500":
          description: Internal Server Error
  /journal/publish/{id}:
    post:
      tags: [Journal]
      summary: Publish a journal entry (Teacher)
      security:
        - JWT: []
      parameters:
        - in: path
          name: id
          required: true
          description: ID of the journal entry to be published
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Journal entry published successfully
        "400":
          description: Validation Error
        "404":
          description: Journal entry not found
        "500":
          description: Internal Server Error

  # ============= DRAFT MODE =============
  /journal/drafts/all:
    get:
      tags: [Draft]
      summary: Get all drafts for current teacher
      security:
        - JWT: []
      responses:
        "200":
          description: List of draft journals
          schema:
            type: array
            items:
              $ref: "#/definitions/Journal"
        "500":
          description: Internal Server Error

  /journal/drafts/{id}/publish:
    post:
      tags: [Draft]
      summary: Publish a draft journal (Teacher)
      security:
        - JWT: []
      parameters:
        - in: path
          name: id
          required: true
          description: ID of the draft journal to publish
          schema:
            type: integer
            format: int64
        - in: body
          name: body
          description: Optional publish datetime
          schema:
            type: object
            properties:
              publishedAt:
                type: string
                format: date-time
                description: Optional scheduled publish time
      responses:
        "200":
          description: Draft published successfully
        "400":
          description: Journal is already published
        "403":
          description: Not authorized to publish this journal
        "404":
          description: Journal not found
        "500":
          description: Internal Server Error

  # ============= COMMENTS =============
  /journal/{journalId}/comments:
    get:
      tags: [Comments]
      summary: Get all comments for a journal (nested structure)
      security:
        - JWT: []
      parameters:
        - in: path
          name: journalId
          required: true
          description: ID of the journal
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: List of comments with nested replies
          schema:
            type: array
            items:
              $ref: "#/definitions/Comment"
        "404":
          description: Journal not found
        "500":
          description: Internal Server Error

    post:
      tags: [Comments]
      summary: Add a comment to a journal
      security:
        - JWT: []
      parameters:
        - in: path
          name: journalId
          required: true
          description: ID of the journal
          schema:
            type: integer
            format: int64
        - in: body
          name: body
          required: true
          schema:
            type: object
            properties:
              content:
                type: string
                description: Comment content
              parentId:
                type: integer
                description: Parent comment ID for replies (optional)
            required:
              - content
      responses:
        "201":
          description: Comment added successfully
        "400":
          description: Bad Request
        "404":
          description: Journal or parent comment not found
        "500":
          description: Internal Server Error

  /journal/{journalId}/comments/count:
    get:
      tags: [Comments]
      summary: Get comment count for a journal
      security:
        - JWT: []
      parameters:
        - in: path
          name: journalId
          required: true
          description: ID of the journal
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Comment count
          schema:
            type: object
            properties:
              count:
                type: integer
        "500":
          description: Internal Server Error

  /comment/{id}:
    put:
      tags: [Comments]
      summary: Update a comment (owner only)
      security:
        - JWT: []
      parameters:
        - in: path
          name: id
          required: true
          description: ID of the comment
          schema:
            type: integer
            format: int64
        - in: body
          name: body
          required: true
          schema:
            type: object
            properties:
              content:
                type: string
            required:
              - content
      responses:
        "200":
          description: Comment updated successfully
        "403":
          description: Not authorized to edit this comment
        "404":
          description: Comment not found
        "500":
          description: Internal Server Error

    delete:
      tags: [Comments]
      summary: Delete a comment (owner or journal's teacher)
      security:
        - JWT: []
      parameters:
        - in: path
          name: id
          required: true
          description: ID of the comment
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Comment deleted successfully
        "403":
          description: Not authorized to delete this comment
        "404":
          description: Comment not found
        "500":
          description: Internal Server Error

  # ============= READ RECEIPTS =============
  /journal/{journalId}/read:
    post:
      tags: [Read Receipts]
      summary: Mark a journal as read (Student only)
      security:
        - JWT: []
      parameters:
        - in: path
          name: journalId
          required: true
          description: ID of the journal
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Journal marked as read
          schema:
            type: object
            properties:
              alreadyRead:
                type: boolean
              readAt:
                type: string
                format: date-time
        "403":
          description: Not authorized to view this journal
        "404":
          description: Journal not found
        "500":
          description: Internal Server Error

  /journal/{journalId}/read-status:
    get:
      tags: [Read Receipts]
      summary: Check if current user has read a journal (Student)
      security:
        - JWT: []
      parameters:
        - in: path
          name: journalId
          required: true
          description: ID of the journal
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Read status
          schema:
            type: object
            properties:
              hasRead:
                type: boolean
              readAt:
                type: string
                format: date-time
        "500":
          description: Internal Server Error

  /journal/{journalId}/read-stats:
    get:
      tags: [Read Receipts]
      summary: Get read statistics for a journal (Teacher only)
      security:
        - JWT: []
      parameters:
        - in: path
          name: journalId
          required: true
          description: ID of the journal
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Read statistics
          schema:
            $ref: "#/definitions/ReadStats"
        "403":
          description: Not authorized to view stats for this journal
        "404":
          description: Journal not found
        "500":
          description: Internal Server Error

  /journal/{journalId}/readers:
    get:
      tags: [Read Receipts]
      summary: Get list of students who have read a journal (Teacher only)
      security:
        - JWT: []
      parameters:
        - in: path
          name: journalId
          required: true
          description: ID of the journal
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: List of readers
          schema:
            type: array
            items:
              type: object
              properties:
                student_id:
                  type: integer
                first_name:
                  type: string
                last_name:
                  type: string
                email:
                  type: string
                read_at:
                  type: string
                  format: date-time
        "404":
          description: Journal not found
        "500":
          description: Internal Server Error

  /user/unread-count:
    get:
      tags: [Read Receipts]
      summary: Get count of unread journals (Student only)
      security:
        - JWT: []
      responses:
        "200":
          description: Unread count
          schema:
            type: object
            properties:
              unreadCount:
                type: integer
        "500":
          description: Internal Server Error

  /user/unread-journals:
    get:
      tags: [Read Receipts]
      summary: Get list of unread journal IDs (Student only)
      security:
        - JWT: []
      responses:
        "200":
          description: List of unread journal IDs
          schema:
            type: object
            properties:
              unreadJournalIds:
                type: array
                items:
                  type: integer
        "500":
          description: Internal Server Error

  # ============= CATEGORIES =============
  /category:
    get:
      tags: [Categories]
      summary: Get all categories
      security:
        - JWT: []
      responses:
        "200":
          description: List of all categories
          schema:
            type: array
            items:
              $ref: "#/definitions/Category"
        "500":
          description: Internal Server Error

    post:
      tags: [Categories]
      summary: Create a new category (Teacher only)
      security:
        - JWT: []
      consumes:
        - application/json
      parameters:
        - in: body
          name: body
          required: true
          schema:
            type: object
            properties:
              name:
                type: string
                description: Category name (unique)
              description:
                type: string
                description: Category description (optional)
            required:
              - name
      responses:
        "201":
          description: Category created successfully
        "400":
          description: Bad Request
        "409":
          description: Category with this name already exists
        "500":
          description: Internal Server Error

  /category/{id}:
    get:
      tags: [Categories]
      summary: Get a category by ID
      security:
        - JWT: []
      parameters:
        - in: path
          name: id
          required: true
          description: ID of the category
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Category details
          schema:
            $ref: "#/definitions/Category"
        "404":
          description: Category not found
        "500":
          description: Internal Server Error

    put:
      tags: [Categories]
      summary: Update a category (Teacher only)
      security:
        - JWT: []
      consumes:
        - application/json
      parameters:
        - in: path
          name: id
          required: true
          description: ID of the category
          schema:
            type: integer
            format: int64
        - in: body
          name: body
          required: true
          schema:
            type: object
            properties:
              name:
                type: string
              description:
                type: string
      responses:
        "200":
          description: Category updated successfully
        "404":
          description: Category not found
        "500":
          description: Internal Server Error

    delete:
      tags: [Categories]
      summary: Delete a category (Teacher only)
      security:
        - JWT: []
      parameters:
        - in: path
          name: id
          required: true
          description: ID of the category
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Category deleted successfully
        "404":
          description: Category not found
        "500":
          description: Internal Server Error
